services:
  db:
    image: postgres:16-alpine
    container_name: tartan-db
    environment:
      POSTGRES_USER: tartan
      POSTGRES_PASSWORD: tartan
      POSTGRES_DB: tartan
    ports:
      - '5433:5432'
    volumes:
      - tartan_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tartan']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: tartan-backend
    depends_on:
      db:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: tartan
      DB_PASSWORD: tartan
      DB_NAME: tartan
      JWT_SECRET: change-me-in-production
      OLLAMA_URL: http://ollama:11434
      PORT: 3000
    ports:
      - '3000:3000'

  ollama:
    image: ollama/ollama
    container_name: tartan-ollama
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama

  ollama-pull:
    image: curlimages/curl:latest
    container_name: tartan-ollama-pull
    depends_on:
      - ollama
    command: >
      -X POST http://ollama:11434/api/pull -d '{"name": "llama3.2"}'


  frontend:
    image: node:20-alpine
    container_name: tartan-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  tartan_pgdata:
  ollama_data:
