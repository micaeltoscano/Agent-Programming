<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tetris Arcade</title>
    <link rel="stylesheet" href="styles/style.css">
  </head>
  <body>
    <main class="game-shell" aria-label="Tetris Arcade">
      <section class="play-area">
        <canvas id="board" width="300" height="600" aria-label="Campo de jogo"></canvas>
      </section>

      <aside class="side-panel" aria-label="Informacoes do jogo">
        <div class="panel-block">
          <h1>Tetris Arcade</h1>
          <p>Fase 2: niveis e pontuacao</p>
        </div>

        <div class="panel-block stats">
          <h2>Placar</h2>
          <dl>
            <div>
              <dt>Pontos</dt>
              <dd id="score">0</dd>
            </div>
            <div>
              <dt>Recorde</dt>
              <dd id="high-score">0</dd>
            </div>
            <div>
              <dt>Nivel</dt>
              <dd id="level">1</dd>
            </div>
            <div>
              <dt>Linhas</dt>
              <dd id="lines">0</dd>
            </div>
            <div>
              <dt>Combo</dt>
              <dd id="combo">0</dd>
            </div>
          </dl>
        </div>

        <div class="panel-block">
          <h2>Proxima</h2>
          <canvas id="next" width="120" height="120" aria-label="Proxima peca"></canvas>
        </div>

        <div class="panel-block controls">
          <h2>Controles</h2>
          <p><kbd>←</kbd><kbd>→</kbd> mover</p>
          <p><kbd>↑</kbd> rotacionar</p>
          <p><kbd>↓</kbd> acelerar</p>
          <p><kbd>Espaco</kbd> soltar</p>
          <p><kbd>R</kbd> reiniciar</p>
        </div>
      </aside>
    </main>

    <script src="src/app.js"></script>
  </body>
</html>
